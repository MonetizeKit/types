name: Release

# Publishes @monetizekit/types to public npm via Changesets on merge to main.
# Requires NPM_TOKEN (npm automation token for the @monetizekit org), provided
# as a secret on the "Production" environment (synced from Phase.dev) or as an
# org/repo Actions secret.
on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Changesets Release
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Enable corepack
        run: corepack enable
      - name: Check for npm token
        id: npmtoken
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::NPM_TOKEN is not set; skipping publish. Configure it (Phase.dev sync to this repo or a repo/org Actions secret) to enable releases."
          fi
      - name: Install dependencies
        if: steps.npmtoken.outputs.present == 'true'
        run: pnpm install --frozen-lockfile
      - name: Build
        if: steps.npmtoken.outputs.present == 'true'
        run: pnpm build
      - name: Create release PR or publish
        if: steps.npmtoken.outputs.present == 'true'
        uses: changesets/action@v1
        with:
          publish: pnpm exec changeset publish
          version: pnpm exec changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
